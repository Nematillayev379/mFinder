services:
  - type: worker
    name: anime-finder-bot
    runtime: image
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.2-11b-vision-preview
      - key: STARTUP_DELAY
        value: "15"
    healthCheckPath: ""
    autoDeploy: true
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
